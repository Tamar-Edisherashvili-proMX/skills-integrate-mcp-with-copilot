<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="account-area">
        <button id="account-button" class="account-button" type="button" aria-label="Teacher account menu">
          👤
        </button>
        <div id="account-menu" class="account-menu hidden">
          <button id="open-login" type="button">Teacher Login</button>
          <button id="logout-button" type="button" class="hidden">Logout</button>
        </div>
      </div>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <p id="auth-status" class="auth-status">Viewing as student (read-only)</p>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Register a Student (Teachers Only)</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <p id="signup-help" class="info">Teacher login required to register or unregister students.</p>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <div id="login-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="login-title">
      <div class="modal-content">
        <h3 id="login-title">Teacher Login</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" required placeholder="e.g. mrs.johnson" />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" required placeholder="Teacher password" />
          </div>
          <div class="modal-actions">
            <button type="submit">Login</button>
            <button id="close-login" type="button" class="secondary">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
